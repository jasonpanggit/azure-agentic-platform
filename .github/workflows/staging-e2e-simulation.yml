name: Staging E2E + Incident Simulation

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '.github/workflows/staging-e2e-simulation.yml'
      - 'services/**'
      - 'e2e/**'
      - 'agents/**'
      - 'scripts/simulate-incidents/**'

permissions:
  id-token: write
  contents: read

env:
  E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
  E2E_API_URL: ${{ vars.E2E_API_URL }}

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging
    # Skip when E2E_BASE_URL is not configured (requires live staging environment)
    if: ${{ vars.E2E_BASE_URL != '' }}

    env:
      E2E_CLIENT_ID: ${{ secrets.E2E_CLIENT_ID }}
      E2E_CLIENT_SECRET: ${{ secrets.E2E_CLIENT_SECRET }}
      E2E_TENANT_ID: ${{ secrets.E2E_TENANT_ID }}
      E2E_API_AUDIENCE: ${{ secrets.E2E_API_AUDIENCE }}
      E2E_COSMOS_ENDPOINT: ${{ secrets.E2E_COSMOS_ENDPOINT }}
      E2E_COSMOS_DB: ${{ vars.E2E_COSMOS_DB || 'aap' }}
      E2E_TEAMS_TEAM_ID: ${{ secrets.E2E_TEAMS_TEAM_ID }}
      E2E_TEAMS_CHANNEL_ID: ${{ secrets.E2E_TEAMS_CHANNEL_ID }}
      E2E_GRAPH_CLIENT_ID: ${{ secrets.E2E_GRAPH_CLIENT_ID }}
      E2E_GRAPH_CLIENT_SECRET: ${{ secrets.E2E_GRAPH_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests
        working-directory: e2e
        run: npx playwright test --config=playwright.config.ts --project=e2e-chromium
        timeout-minutes: 15

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-results
          path: e2e/test-results/
          retention-days: 7

  simulation:
    name: Incident Simulation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [e2e]
    environment: staging
    # Skip when E2E_BASE_URL is not configured (requires live staging environment)
    if: ${{ vars.E2E_BASE_URL != '' }}

    env:
      API_GATEWAY_URL: ${{ vars.E2E_API_URL }}
      COSMOS_ENDPOINT: ${{ secrets.E2E_COSMOS_ENDPOINT }}
      COSMOS_DATABASE_NAME: ${{ vars.E2E_COSMOS_DB || 'aap' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install simulation dependencies
        run: pip install -r scripts/simulate-incidents/requirements.txt

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run Simulation Suite
        run: bash scripts/simulate-incidents/run-all.sh

      - name: Upload Simulation Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulation-results
          path: scripts/simulate-incidents/simulation-results.log
          retention-days: 14