name: Detection Plane CI

on:
  push:
    paths:
      - "services/detection-plane/**"
      - "fabric/**"
      - ".github/workflows/detection-plane-ci.yml"
  pull_request:
    paths:
      - "services/detection-plane/**"
      - "fabric/**"
      - ".github/workflows/detection-plane-ci.yml"

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/detection-plane
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install msal requests

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detection-plane-unit-test-results
          path: services/detection-plane/test-results.xml

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint detection-plane
        run: ruff check services/detection-plane/

      - name: Lint user-data-function
        run: ruff check fabric/user-data-function/

  # Integration tests run separately (requires Azure credentials)
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: unit-tests
    permissions:
      id-token: write
    defaults:
      run:
        working-directory: services/detection-plane
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run integration tests
        env:
          COSMOS_ENDPOINT: ${{ secrets.E2E_COSMOS_ENDPOINT }}
          COSMOS_DATABASE_NAME: ${{ vars.E2E_COSMOS_DB || 'aap' }}
          EVENTHUB_CONNECTION_STRING: ${{ secrets.EVENTHUB_CONNECTION_STRING }}
        run: python -m pytest tests/integration/ -v -m integration --tb=short
