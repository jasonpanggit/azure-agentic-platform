name: Build Web UI

on:
  push:
    branches: [main]
    paths:
      - 'services/web-ui/**'
  workflow_dispatch:
    inputs:
      no_cache:
        description: 'Disable Docker build cache (force full rebuild)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  id-token: write
  contents: read

jobs:
  build-web-ui:
    name: Build & Push Web UI
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: services/web-ui
      dockerfile_path: services/web-ui/Dockerfile
      build_context: services/web-ui/
      no_cache: ${{ github.event.inputs.no_cache == 'true' }}
      build_args: |
        NEXT_PUBLIC_AZURE_CLIENT_ID=${{ vars.NEXT_PUBLIC_AZURE_CLIENT_ID }}
        NEXT_PUBLIC_TENANT_ID=${{ vars.NEXT_PUBLIC_TENANT_ID }}
        NEXT_PUBLIC_REDIRECT_URI=${{ vars.NEXT_PUBLIC_REDIRECT_URI }}
        NEXT_PUBLIC_DEV_MODE=${{ vars.NEXT_PUBLIC_DEV_MODE }}
    secrets: inherit
