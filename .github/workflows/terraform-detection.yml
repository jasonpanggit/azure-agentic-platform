name: Terraform Detection Plane

on:
  push:
    paths:
      - "terraform/modules/fabric/**"
      - "terraform/modules/eventhub/**"
      - "terraform/modules/activity-log/**"
      - "terraform/modules/networking/**"
      - "terraform/modules/databases/cosmos.tf"
      - "terraform/modules/private-endpoints/**"
      - "terraform/envs/*/main.tf"
      - ".github/workflows/terraform-detection.yml"
  pull_request:
    paths:
      - "terraform/modules/fabric/**"
      - "terraform/modules/eventhub/**"
      - "terraform/modules/activity-log/**"
      - "terraform/modules/networking/**"
      - "terraform/modules/databases/cosmos.tf"
      - "terraform/modules/private-endpoints/**"
      - "terraform/envs/*/main.tf"
      - ".github/workflows/terraform-detection.yml"

jobs:
  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - terraform/modules/fabric
          - terraform/modules/eventhub
          - terraform/modules/activity-log
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        working-directory: ${{ matrix.module }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ${{ matrix.module }}
        run: terraform validate
