name: Build & Push Docker Image

on:
  workflow_call:
    inputs:
      image_name:
        description: 'Name of the Docker image (e.g., agents/orchestrator)'
        required: true
        type: string
      dockerfile_path:
        description: 'Path to the Dockerfile'
        required: true
        type: string
      build_context:
        description: 'Docker build context path'
        required: true
        type: string
      build_args:
        description: 'Docker build arguments (newline-separated KEY=VALUE pairs)'
        required: false
        type: string
        default: ''
      image_tag:
        description: 'Image tag override (default: git SHA)'
        required: false
        type: string
        default: ''

permissions:
  contents: read

env:
  ARM_USE_OIDC: false

jobs:
  build-and-push:
    name: Build & Push ${{ inputs.image_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.sha }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile_path }}
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}:${{ steps.tag.outputs.tag }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}:latest
          build-args: ${{ inputs.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image Size Check
        run: |
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}:${{ steps.tag.outputs.tag }}"
          SIZE=$(docker manifest inspect "$IMAGE" 2>/dev/null | jq '[.layers[].size] | add // 0')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB}MB"
          if [ "$SIZE_MB" -gt 1500 ]; then
            echo "::error::Image size ${SIZE_MB}MB exceeds 1500MB limit"
            exit 1
          fi
