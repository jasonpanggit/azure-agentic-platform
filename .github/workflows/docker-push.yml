name: Build & Push Docker Image

on:
  workflow_call:
    inputs:
      image_name:
        description: 'Name of the Docker image (e.g., agents/orchestrator)'
        required: true
        type: string
      dockerfile_path:
        description: 'Path to the Dockerfile'
        required: true
        type: string
      build_context:
        description: 'Docker build context path'
        required: true
        type: string
      build_args:
        description: 'Docker build arguments (newline-separated KEY=VALUE pairs)'
        required: false
        type: string
        default: ''
      image_tag:
        description: 'Image tag override (default: git SHA)'
        required: false
        type: string
        default: ''
      no_cache:
        description: 'Disable Docker build cache (force full rebuild)'
        required: false
        type: boolean
        default: false
      push_image:
        description: 'Whether to push the built image to ACR'
        required: false
        type: boolean
        default: true
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_CLIENT_SECRET:
        required: false
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

permissions:
  id-token: write
  contents: read

env:
  ARM_USE_OIDC: true

jobs:
  build-and-push:
    name: Build & Push ${{ inputs.image_name }}
    runs-on: [self-hosted, azure, linux]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Resolve Azure auth mode
        id: auth
        if: inputs.push_image
        env:
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          if [ -n "$AZURE_CLIENT_SECRET" ]; then
            echo "mode=client-secret" >> "$GITHUB_OUTPUT"
          else
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure Login (client secret)
        if: inputs.push_image && steps.auth.outputs.mode == 'client-secret'
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          timeout 60 az login --service-principal \
            --username "$AZURE_CLIENT_ID" \
            --password "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID" \
            --output none
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

      - name: Azure Login (OIDC)
        if: inputs.push_image && steps.auth.outputs.mode == 'oidc'
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302 # v2.2.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.sha }}"
          fi

          if [[ ! "$TAG" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::Resolved image tag has an invalid format: $TAG"
            exit 1
          fi

          printf 'tag=%s\n' "$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate ACR name
        id: acr
        run: |
          ACR_LOGIN_SERVER="${{ vars.ACR_LOGIN_SERVER }}"
          if [ -z "$ACR_LOGIN_SERVER" ]; then
            echo "::error::ACR_LOGIN_SERVER repository variable is not set"
            exit 1
          fi

          ACR_NAME="${ACR_LOGIN_SERVER%%.azurecr.io}"
          if [[ ! "$ACR_NAME" =~ ^[a-z0-9][a-z0-9-]{3,48}[a-z0-9]$ ]]; then
            echo "::error::Resolved ACR name has an invalid format: $ACR_NAME"
            exit 1
          fi

          echo "name=$ACR_NAME" >> "$GITHUB_OUTPUT"
          echo "login_server=$ACR_LOGIN_SERVER" >> "$GITHUB_OUTPUT"

      - name: Build & Push via ACR Tasks
        if: inputs.push_image
        run: |
          # Build args: convert newline-separated KEY=VALUE pairs to --build-arg flags
          BUILD_ARG_FLAGS=""
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            BUILD_ARG_FLAGS="$BUILD_ARG_FLAGS --build-arg $line"
          done <<< "${{ inputs.build_args }}"

          NO_CACHE_FLAG=""
          if [ "${{ inputs.no_cache }}" = "true" ]; then
            NO_CACHE_FLAG="--no-cache"
          fi

          IMAGE="${{ steps.acr.outputs.login_server }}/${{ inputs.image_name }}"
          TAG="${{ steps.tag.outputs.tag }}"

          # az acr build runs the build server-side in ACR — no local Docker daemon required.
          # --agent-pool targets our VNet-injected private agent pool so it can reach the
          # private ACR endpoint (publicNetworkAccess=Disabled).
          # --timeout 1800 caps individual builds at 30 min so a hung ACR task fails
          # fast rather than holding the GitHub runner open until it loses communication.
          az acr build \
            --registry "${{ steps.acr.outputs.name }}" \
            --agent-pool "aap-builder-prod" \
            --image "${IMAGE}:${TAG}" \
            --image "${IMAGE}:latest" \
            --file "${{ inputs.dockerfile_path }}" \
            --platform linux/amd64 \
            --timeout 1800 \
            $NO_CACHE_FLAG \
            $BUILD_ARG_FLAGS \
            "${{ inputs.build_context }}"

      - name: Build only (no push)
        if: '!inputs.push_image'
        run: |
          # Validate the build context and Dockerfile exist
          if [ ! -f "${{ inputs.dockerfile_path }}" ]; then
            echo "::error::Dockerfile not found at ${{ inputs.dockerfile_path }}"
            exit 1
          fi
          echo "push_image=false — skipping build (no Docker daemon available on self-hosted runner)"

      - name: Image Size Check
        if: inputs.push_image
        run: |
          IMAGE="${{ steps.acr.outputs.login_server }}/${{ inputs.image_name }}"
          TAG="${{ steps.tag.outputs.tag }}"

          # Use az acr manifest to inspect image size — no Docker daemon required
          MANIFEST=$(az acr manifest show \
            --registry "${{ steps.acr.outputs.name }}" \
            --name "${{ inputs.image_name }}:${TAG}" \
            --output json 2>/dev/null || true)

          if [ -z "$MANIFEST" ]; then
            echo "::warning::Could not inspect manifest for ${IMAGE}:${TAG} — skipping size check"
            exit 0
          fi

          SIZE=$(echo "$MANIFEST" | jq '([.layers // .manifests // [] | .[].size // 0] | add) // 0')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB}MB"
          if [ "$SIZE_MB" -gt 1500 ]; then
            echo "::error::Image size ${SIZE_MB}MB exceeds 1500MB limit"
            exit 1
          fi
