name: Build & Push Docker Image

on:
  workflow_call:
    inputs:
      image_name:
        description: 'Name of the Docker image (e.g., agents/orchestrator)'
        required: true
        type: string
      dockerfile_path:
        description: 'Path to the Dockerfile'
        required: true
        type: string
      build_context:
        description: 'Docker build context path'
        required: true
        type: string
      build_args:
        description: 'Docker build arguments (newline-separated KEY=VALUE pairs)'
        required: false
        type: string
        default: ''
      image_tag:
        description: 'Image tag override (default: git SHA)'
        required: false
        type: string
        default: ''
      no_cache:
        description: 'Disable Docker build cache (force full rebuild)'
        required: false
        type: boolean
        default: false
      push_image:
        description: 'Whether to push the built image to ACR'
        required: false
        type: boolean
        default: true
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_CLIENT_SECRET:
        required: false
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

permissions:
  id-token: write
  contents: read

env:
  ARM_USE_OIDC: true

jobs:
  build-and-push:
    name: Build & Push ${{ inputs.image_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Resolve Azure auth mode
        id: auth
        if: inputs.push_image
        env:
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          if [ -n "$AZURE_CLIENT_SECRET" ]; then
            echo "mode=client-secret" >> "$GITHUB_OUTPUT"
          else
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure Login (client secret)
        if: inputs.push_image && steps.auth.outputs.mode == 'client-secret'
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          timeout 60 az login --service-principal \
            --username "$AZURE_CLIENT_ID" \
            --password "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID" \
            --output none
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

      - name: Azure Login (OIDC)
        if: inputs.push_image && steps.auth.outputs.mode == 'oidc'
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302 # v2.2.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        if: inputs.push_image
        run: |
          ACR_NAME="${{ vars.ACR_LOGIN_SERVER }}"
          if [ -z "$ACR_NAME" ]; then
            echo "::error::ACR_LOGIN_SERVER repository variable is not set"
            exit 1
          fi

          ACR_NAME="${ACR_NAME%%.azurecr.io}"
          if [[ ! "$ACR_NAME" =~ ^[a-z0-9][a-z0-9-]{3,48}[a-z0-9]$ ]]; then
            echo "::error::Resolved ACR name has an invalid format: $ACR_NAME"
            exit 1
          fi

          az acr login --name "$ACR_NAME"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.sha }}"
          fi

          if [[ ! "$TAG" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::Resolved image tag has an invalid format: $TAG"
            exit 1
          fi

          printf 'tag=%s\n' "$TAG" >> "$GITHUB_OUTPUT"

      - name: Build and Push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile_path }}
          push: ${{ inputs.push_image }}
          platforms: linux/amd64
          tags: |
            ${{ vars.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}:${{ steps.tag.outputs.tag }}
            ${{ vars.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}:latest
          build-args: ${{ inputs.build_args }}
          no-cache: ${{ inputs.no_cache }}
          cache-from: ${{ inputs.no_cache && '' || 'type=gha' }}
          cache-to: ${{ inputs.no_cache && '' || 'type=gha,mode=max' }}

      - name: Image Size Check
        if: ${{ inputs.push_image }}
        run: |
          IMAGE="${{ vars.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}:${{ steps.tag.outputs.tag }}"
          MANIFEST=""
          for attempt in 1 2 3 4 5 6; do
            MANIFEST=$(docker manifest inspect "$IMAGE" 2>/dev/null || true)
            if [ -n "$MANIFEST" ]; then
              break
            fi

            if [ "$attempt" -lt 6 ]; then
              echo "Manifest not yet available for $IMAGE; retrying after registry propagation delay"
              sleep 10
            fi
          done

          if [ -z "$MANIFEST" ]; then
            echo "::error::Could not inspect manifest for $IMAGE after waiting for registry propagation"
            exit 1
          fi

          SIZE=$(echo "$MANIFEST" | jq '([.layers // .manifests // [] | .[].size // 0] | add) // 0')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB}MB"
          if [ "$SIZE_MB" -gt 1500 ]; then
            echo "::error::Image size ${SIZE_MB}MB exceeds 1500MB limit"
            exit 1
          fi
