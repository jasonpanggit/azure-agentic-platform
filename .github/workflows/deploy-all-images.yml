name: Deploy All Images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (default: git SHA). Use "latest" for latest.'
        required: false
        default: ''
        type: string

permissions:
  id-token: write
  contents: read

env:
  ARM_USE_OIDC: true

jobs:
  # ---------------------------------------------------------------------------
  # Phase 1: Build agent base image (all agent images depend on this)
  # ---------------------------------------------------------------------------
  build-agent-base:
    name: Build Agent Base Image
    runs-on: [self-hosted, azure, linux]
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Resolve image tag
        id: meta
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.sha }}"
          fi

          if [[ ! "$TAG" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::Resolved image tag has an invalid format: $TAG"
            exit 1
          fi

          printf 'image_tag=%s\n' "$TAG" >> "$GITHUB_OUTPUT"

      - name: Resolve Azure auth mode
        id: auth
        env:
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          if [ -n "$AZURE_CLIENT_SECRET" ]; then
            echo "mode=client-secret" >> "$GITHUB_OUTPUT"
          else
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure Login (client secret)
        if: steps.auth.outputs.mode == 'client-secret'
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          timeout 60 az login --service-principal \
            --username "$AZURE_CLIENT_ID" \
            --password "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID" \
            --output none
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

      - name: Azure Login (OIDC)
        if: steps.auth.outputs.mode == 'oidc'
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302 # v2.2.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: |
          ACR_NAME="${{ vars.ACR_LOGIN_SERVER }}"
          if [ -z "$ACR_NAME" ]; then
            echo "::error::ACR_LOGIN_SERVER repository variable is not set"
            exit 1
          fi

          ACR_NAME="${ACR_NAME%%.azurecr.io}"
          if [[ ! "$ACR_NAME" =~ ^[a-z0-9][a-z0-9-]{3,48}[a-z0-9]$ ]]; then
            echo "::error::Resolved ACR name has an invalid format: $ACR_NAME"
            exit 1
          fi

          az acr login --name "$ACR_NAME"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push base image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: agents/
          file: agents/Dockerfile.base
          push: true
          platforms: linux/amd64
          tags: |
            ${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ steps.meta.outputs.image_tag }}
            ${{ vars.ACR_LOGIN_SERVER }}/agents/base:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Phase 2a: Agent images (depend on base image, build in parallel)
  # ---------------------------------------------------------------------------
  build-orchestrator:
    name: Build Orchestrator
    needs: build-agent-base
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/orchestrator
      dockerfile_path: agents/orchestrator/Dockerfile
      build_context: agents/orchestrator/
      image_tag: ${{ needs.build-agent-base.outputs.image_tag }}
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ needs.build-agent-base.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-compute:
    name: Build Compute Agent
    needs: build-agent-base
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/compute
      dockerfile_path: agents/compute/Dockerfile
      build_context: agents/compute/
      image_tag: ${{ needs.build-agent-base.outputs.image_tag }}
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ needs.build-agent-base.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-network:
    name: Build Network Agent
    needs: build-agent-base
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/network
      dockerfile_path: agents/network/Dockerfile
      build_context: agents/network/
      image_tag: ${{ needs.build-agent-base.outputs.image_tag }}
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ needs.build-agent-base.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-storage:
    name: Build Storage Agent
    needs: build-agent-base
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/storage
      dockerfile_path: agents/storage/Dockerfile
      build_context: agents/storage/
      image_tag: ${{ needs.build-agent-base.outputs.image_tag }}
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ needs.build-agent-base.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-security:
    name: Build Security Agent
    needs: build-agent-base
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/security
      dockerfile_path: agents/security/Dockerfile
      build_context: agents/security/
      image_tag: ${{ needs.build-agent-base.outputs.image_tag }}
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ needs.build-agent-base.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-sre:
    name: Build SRE Agent
    needs: build-agent-base
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/sre
      dockerfile_path: agents/sre/Dockerfile
      build_context: agents/sre/
      image_tag: ${{ needs.build-agent-base.outputs.image_tag }}
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ needs.build-agent-base.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-arc:
    name: Build Arc Agent
    needs: build-agent-base
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/arc
      dockerfile_path: agents/arc/Dockerfile
      build_context: agents/arc/
      image_tag: ${{ needs.build-agent-base.outputs.image_tag }}
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ needs.build-agent-base.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-patch:
    name: Build Patch Agent
    needs: build-agent-base
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/patch
      dockerfile_path: agents/patch/Dockerfile
      build_context: agents/patch/
      image_tag: ${{ needs.build-agent-base.outputs.image_tag }}
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ needs.build-agent-base.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-eol:
    name: Build EOL Agent
    needs: build-agent-base
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/eol
      dockerfile_path: agents/eol/Dockerfile
      build_context: agents/eol/
      image_tag: ${{ needs.build-agent-base.outputs.image_tag }}
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ needs.build-agent-base.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ---------------------------------------------------------------------------
  # Phase 2b: Service images (independent, parallel with agent builds)
  # ---------------------------------------------------------------------------
  build-api-gateway:
    name: Build API Gateway
    needs: build-agent-base
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: services/api-gateway
      dockerfile_path: services/api-gateway/Dockerfile
      build_context: .
      image_tag: ${{ needs.build-agent-base.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-arc-mcp-server:
    name: Build Arc MCP Server
    needs: build-agent-base
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: services/arc-mcp-server
      dockerfile_path: services/arc-mcp-server/Dockerfile
      build_context: services/arc-mcp-server/
      image_tag: ${{ needs.build-agent-base.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-teams-bot:
    name: Build Teams Bot
    needs: build-agent-base
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: services/teams-bot
      dockerfile_path: services/teams-bot/Dockerfile
      build_context: services/teams-bot/
      image_tag: ${{ needs.build-agent-base.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-web-ui:
    name: Build Web UI
    needs: build-agent-base
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: services/web-ui
      dockerfile_path: services/web-ui/Dockerfile
      build_context: services/web-ui/
      image_tag: ${{ needs.build-agent-base.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-azure-mcp-server:
    name: Build Azure MCP Server
    needs: build-agent-base
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: services/azure-mcp-server
      dockerfile_path: services/azure-mcp-server/Dockerfile
      build_context: services/azure-mcp-server/
      image_tag: ${{ needs.build-agent-base.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ---------------------------------------------------------------------------
  # Summary: list all built images and their statuses
  # ---------------------------------------------------------------------------
  summary:
    name: Deployment Summary
    runs-on: [self-hosted, azure, linux]
    if: always()
    needs:
      - build-agent-base
      - build-orchestrator
      - build-compute
      - build-network
      - build-storage
      - build-security
      - build-sre
      - build-arc
      - build-patch
      - build-eol
      - build-api-gateway
      - build-arc-mcp-server
      - build-teams-bot
      - build-web-ui
      - build-azure-mcp-server
    steps:
      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.sha }}"
          fi
          printf 'tag=%s\n' "$TAG" >> "$GITHUB_OUTPUT"

      - name: Print summary
        run: |
          echo "## Deploy All Images — Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tag:** \`${{ steps.tag.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Agent Images" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| agents/base | ${{ needs.build-agent-base.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| agents/orchestrator | ${{ needs.build-orchestrator.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| agents/compute | ${{ needs.build-compute.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| agents/network | ${{ needs.build-network.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| agents/storage | ${{ needs.build-storage.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| agents/security | ${{ needs.build-security.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| agents/sre | ${{ needs.build-sre.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| agents/arc | ${{ needs.build-arc.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| agents/patch | ${{ needs.build-patch.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| agents/eol | ${{ needs.build-eol.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Service Images" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| services/api-gateway | ${{ needs.build-api-gateway.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| services/arc-mcp-server | ${{ needs.build-arc-mcp-server.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| services/teams-bot | ${{ needs.build-teams-bot.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| services/web-ui | ${{ needs.build-web-ui.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| services/azure-mcp-server | ${{ needs.build-azure-mcp-server.result }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if any image build failed
        if: contains(needs.*.result, 'failure')
        run: |
          echo "::error::One or more image builds failed. See summary above."
          exit 1
