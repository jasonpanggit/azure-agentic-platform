name: Deploy All Images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (default: git SHA). Use "latest" for latest.'
        required: false
        default: ''
        type: string
      force_all:
        description: 'Force rebuild all images regardless of changes'
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

env:
  ARM_USE_OIDC: true

jobs:
  # ---------------------------------------------------------------------------
  # Phase 0: Resolve image tag + detect which source paths changed
  # ---------------------------------------------------------------------------
  resolve-tag:
    name: Resolve Image Tag
    runs-on: [self-hosted, azure, linux]
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Resolve image tag
        id: meta
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.sha }}"
          fi

          if [[ ! "$TAG" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::Resolved image tag has an invalid format: $TAG"
            exit 1
          fi

          printf 'image_tag=%s\n' "$TAG" >> "$GITHUB_OUTPUT"

  detect-changes:
    name: Detect Changed Images
    runs-on: [self-hosted, azure, linux]
    outputs:
      base:            ${{ steps.changes.outputs.base }}
      orchestrator:    ${{ steps.changes.outputs.orchestrator }}
      compute:         ${{ steps.changes.outputs.compute }}
      network:         ${{ steps.changes.outputs.network }}
      storage:         ${{ steps.changes.outputs.storage }}
      security:        ${{ steps.changes.outputs.security }}
      sre:             ${{ steps.changes.outputs.sre }}
      arc:             ${{ steps.changes.outputs.arc }}
      patch:           ${{ steps.changes.outputs.patch }}
      eol:             ${{ steps.changes.outputs.eol }}
      api_gateway:     ${{ steps.changes.outputs.api_gateway }}
      arc_mcp_server:  ${{ steps.changes.outputs.arc_mcp_server }}
      teams_bot:       ${{ steps.changes.outputs.teams_bot }}
      web_ui:          ${{ steps.changes.outputs.web_ui }}
      azure_mcp_server: ${{ steps.changes.outputs.azure_mcp_server }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Detect changes since last successful deploy
        id: changes
        run: |
          FORCE="${{ inputs.force_all }}"

          # Find the previous commit to diff against.
          # For workflow_dispatch on main this is HEAD~1.
          PREV=$(git rev-parse HEAD~1 2>/dev/null || echo "")

          set_output() {
            local name="$1"
            local changed="$2"
            if [ "$FORCE" = "true" ]; then
              changed="true"
            fi
            echo "${name}=${changed}" >> "$GITHUB_OUTPUT"
            echo "  ${name}: ${changed}"
          }

          echo "Changed images:"

          if [ -z "$PREV" ]; then
            # First commit — build everything
            for img in base orchestrator compute network storage security sre arc patch eol api_gateway arc_mcp_server teams_bot web_ui azure_mcp_server; do
              set_output "$img" "true"
            done
            exit 0
          fi

          changed_files=$(git diff --name-only "$PREV" HEAD)
          echo "Files changed since $PREV:"
          echo "$changed_files"
          echo ""

          has_change() {
            echo "$changed_files" | grep -q "^$1"
          }

          # Base image: Dockerfile.base, shared deps, or requirements-base.txt
          if has_change "agents/Dockerfile.base" || has_change "agents/requirements-base.txt" || has_change "agents/shared/"; then
            BASE_CHANGED="true"
          else
            BASE_CHANGED="false"
          fi
          set_output "base" "$BASE_CHANGED"

          # Agent images: changed if their own source changed OR base changed
          # (base changed means the BASE_IMAGE arg changes → must rebuild)
          agent_changed() {
            local path="$1"
            if [ "$BASE_CHANGED" = "true" ] || has_change "$path"; then
              echo "true"
            else
              echo "false"
            fi
          }

          set_output "orchestrator"   "$(agent_changed agents/orchestrator/)"
          set_output "compute"        "$(agent_changed agents/compute/)"
          set_output "network"        "$(agent_changed agents/network/)"
          set_output "storage"        "$(agent_changed agents/storage/)"
          set_output "security"       "$(agent_changed agents/security/)"
          set_output "sre"            "$(agent_changed agents/sre/)"
          set_output "arc"            "$(agent_changed agents/arc/)"
          set_output "patch"          "$(agent_changed agents/patch/)"
          set_output "eol"            "$(agent_changed agents/eol/)"

          # Service images: independent — only their own source path matters
          has_change "services/api-gateway/"     && set_output "api_gateway"      "true" || set_output "api_gateway"      "false"
          has_change "services/arc-mcp-server/"  && set_output "arc_mcp_server"   "true" || set_output "arc_mcp_server"   "false"
          has_change "services/teams-bot/"       && set_output "teams_bot"        "true" || set_output "teams_bot"        "false"
          has_change "services/web-ui/"          && set_output "web_ui"           "true" || set_output "web_ui"           "false"
          has_change "services/azure-mcp-server/" && set_output "azure_mcp_server" "true" || set_output "azure_mcp_server" "false"

  # ---------------------------------------------------------------------------
  # Phase 1: Build agent base image
  # ---------------------------------------------------------------------------
  build-agent-base:
    name: Build Agent Base Image
    needs: [resolve-tag, detect-changes]
    if: needs.detect-changes.outputs.base == 'true'
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/base
      dockerfile_path: agents/Dockerfile.base
      build_context: agents/
      image_tag: ${{ needs.resolve-tag.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ---------------------------------------------------------------------------
  # Phase 2a: Agent images (parallel, each skips if unchanged)
  # ---------------------------------------------------------------------------
  build-orchestrator:
    name: Build Orchestrator
    needs: [resolve-tag, detect-changes, build-agent-base]
    if: |
      always() &&
      needs.detect-changes.outputs.orchestrator == 'true' &&
      (needs.build-agent-base.result == 'success' || needs.build-agent-base.result == 'skipped')
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/orchestrator
      dockerfile_path: agents/orchestrator/Dockerfile
      build_context: agents/orchestrator/
      image_tag: ${{ needs.resolve-tag.outputs.image_tag }}
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ needs.resolve-tag.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-compute:
    name: Build Compute Agent
    needs: [resolve-tag, detect-changes, build-agent-base]
    if: |
      always() &&
      needs.detect-changes.outputs.compute == 'true' &&
      (needs.build-agent-base.result == 'success' || needs.build-agent-base.result == 'skipped')
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/compute
      dockerfile_path: agents/compute/Dockerfile
      build_context: agents/compute/
      image_tag: ${{ needs.resolve-tag.outputs.image_tag }}
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ needs.resolve-tag.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-network:
    name: Build Network Agent
    needs: [resolve-tag, detect-changes, build-agent-base]
    if: |
      always() &&
      needs.detect-changes.outputs.network == 'true' &&
      (needs.build-agent-base.result == 'success' || needs.build-agent-base.result == 'skipped')
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/network
      dockerfile_path: agents/network/Dockerfile
      build_context: agents/network/
      image_tag: ${{ needs.resolve-tag.outputs.image_tag }}
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ needs.resolve-tag.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-storage:
    name: Build Storage Agent
    needs: [resolve-tag, detect-changes, build-agent-base]
    if: |
      always() &&
      needs.detect-changes.outputs.storage == 'true' &&
      (needs.build-agent-base.result == 'success' || needs.build-agent-base.result == 'skipped')
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/storage
      dockerfile_path: agents/storage/Dockerfile
      build_context: agents/storage/
      image_tag: ${{ needs.resolve-tag.outputs.image_tag }}
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ needs.resolve-tag.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-security:
    name: Build Security Agent
    needs: [resolve-tag, detect-changes, build-agent-base]
    if: |
      always() &&
      needs.detect-changes.outputs.security == 'true' &&
      (needs.build-agent-base.result == 'success' || needs.build-agent-base.result == 'skipped')
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/security
      dockerfile_path: agents/security/Dockerfile
      build_context: agents/security/
      image_tag: ${{ needs.resolve-tag.outputs.image_tag }}
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ needs.resolve-tag.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-sre:
    name: Build SRE Agent
    needs: [resolve-tag, detect-changes, build-agent-base]
    if: |
      always() &&
      needs.detect-changes.outputs.sre == 'true' &&
      (needs.build-agent-base.result == 'success' || needs.build-agent-base.result == 'skipped')
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/sre
      dockerfile_path: agents/sre/Dockerfile
      build_context: agents/sre/
      image_tag: ${{ needs.resolve-tag.outputs.image_tag }}
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ needs.resolve-tag.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-arc:
    name: Build Arc Agent
    needs: [resolve-tag, detect-changes, build-agent-base]
    if: |
      always() &&
      needs.detect-changes.outputs.arc == 'true' &&
      (needs.build-agent-base.result == 'success' || needs.build-agent-base.result == 'skipped')
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/arc
      dockerfile_path: agents/arc/Dockerfile
      build_context: agents/arc/
      image_tag: ${{ needs.resolve-tag.outputs.image_tag }}
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ needs.resolve-tag.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-patch:
    name: Build Patch Agent
    needs: [resolve-tag, detect-changes, build-agent-base]
    if: |
      always() &&
      needs.detect-changes.outputs.patch == 'true' &&
      (needs.build-agent-base.result == 'success' || needs.build-agent-base.result == 'skipped')
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/patch
      dockerfile_path: agents/patch/Dockerfile
      build_context: agents/patch/
      image_tag: ${{ needs.resolve-tag.outputs.image_tag }}
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ needs.resolve-tag.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-eol:
    name: Build EOL Agent
    needs: [resolve-tag, detect-changes, build-agent-base]
    if: |
      always() &&
      needs.detect-changes.outputs.eol == 'true' &&
      (needs.build-agent-base.result == 'success' || needs.build-agent-base.result == 'skipped')
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/eol
      dockerfile_path: agents/eol/Dockerfile
      build_context: agents/eol/
      image_tag: ${{ needs.resolve-tag.outputs.image_tag }}
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ needs.resolve-tag.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ---------------------------------------------------------------------------
  # Phase 2b: Service images (independent, parallel with agent builds)
  # ---------------------------------------------------------------------------
  build-api-gateway:
    name: Build API Gateway
    needs: [resolve-tag, detect-changes]
    if: needs.detect-changes.outputs.api_gateway == 'true'
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: services/api-gateway
      dockerfile_path: services/api-gateway/Dockerfile
      build_context: .
      image_tag: ${{ needs.resolve-tag.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-arc-mcp-server:
    name: Build Arc MCP Server
    needs: [resolve-tag, detect-changes]
    if: needs.detect-changes.outputs.arc_mcp_server == 'true'
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: services/arc-mcp-server
      dockerfile_path: services/arc-mcp-server/Dockerfile
      build_context: services/arc-mcp-server/
      image_tag: ${{ needs.resolve-tag.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-teams-bot:
    name: Build Teams Bot
    needs: [resolve-tag, detect-changes]
    if: needs.detect-changes.outputs.teams_bot == 'true'
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: services/teams-bot
      dockerfile_path: services/teams-bot/Dockerfile
      build_context: services/teams-bot/
      image_tag: ${{ needs.resolve-tag.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-web-ui:
    name: Build Web UI
    needs: [resolve-tag, detect-changes]
    if: needs.detect-changes.outputs.web_ui == 'true'
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: services/web-ui
      dockerfile_path: services/web-ui/Dockerfile
      build_context: services/web-ui/
      image_tag: ${{ needs.resolve-tag.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-azure-mcp-server:
    name: Build Azure MCP Server
    needs: [resolve-tag, detect-changes]
    if: needs.detect-changes.outputs.azure_mcp_server == 'true'
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: services/azure-mcp-server
      dockerfile_path: services/azure-mcp-server/Dockerfile
      build_context: services/azure-mcp-server/
      image_tag: ${{ needs.resolve-tag.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ---------------------------------------------------------------------------
  # Summary
  # ---------------------------------------------------------------------------
  summary:
    name: Deployment Summary
    runs-on: [self-hosted, azure, linux]
    if: always()
    needs:
      - resolve-tag
      - detect-changes
      - build-agent-base
      - build-orchestrator
      - build-compute
      - build-network
      - build-storage
      - build-security
      - build-sre
      - build-arc
      - build-patch
      - build-eol
      - build-api-gateway
      - build-arc-mcp-server
      - build-teams-bot
      - build-web-ui
      - build-azure-mcp-server
    steps:
      - name: Print summary
        run: |
          echo "## Deploy All Images — Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tag:** \`${{ needs.resolve-tag.outputs.image_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Force all:** \`${{ inputs.force_all }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Agent Images" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | Changed | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|---------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| agents/base | ${{ needs.detect-changes.outputs.base }} | ${{ needs.build-agent-base.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| agents/orchestrator | ${{ needs.detect-changes.outputs.orchestrator }} | ${{ needs.build-orchestrator.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| agents/compute | ${{ needs.detect-changes.outputs.compute }} | ${{ needs.build-compute.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| agents/network | ${{ needs.detect-changes.outputs.network }} | ${{ needs.build-network.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| agents/storage | ${{ needs.detect-changes.outputs.storage }} | ${{ needs.build-storage.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| agents/security | ${{ needs.detect-changes.outputs.security }} | ${{ needs.build-security.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| agents/sre | ${{ needs.detect-changes.outputs.sre }} | ${{ needs.build-sre.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| agents/arc | ${{ needs.detect-changes.outputs.arc }} | ${{ needs.build-arc.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| agents/patch | ${{ needs.detect-changes.outputs.patch }} | ${{ needs.build-patch.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| agents/eol | ${{ needs.detect-changes.outputs.eol }} | ${{ needs.build-eol.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Service Images" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | Changed | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|---------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| services/api-gateway | ${{ needs.detect-changes.outputs.api_gateway }} | ${{ needs.build-api-gateway.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| services/arc-mcp-server | ${{ needs.detect-changes.outputs.arc_mcp_server }} | ${{ needs.build-arc-mcp-server.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| services/teams-bot | ${{ needs.detect-changes.outputs.teams_bot }} | ${{ needs.build-teams-bot.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| services/web-ui | ${{ needs.detect-changes.outputs.web_ui }} | ${{ needs.build-web-ui.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| services/azure-mcp-server | ${{ needs.detect-changes.outputs.azure_mcp_server }} | ${{ needs.build-azure-mcp-server.result }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if any image build failed
        if: contains(needs.*.result, 'failure')
        run: |
          echo "::error::One or more image builds failed. See summary above."
          exit 1
