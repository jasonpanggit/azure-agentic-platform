name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'

permissions:
  id-token: write
  contents: read

env:
  TERRAFORM_VERSION: '1.9.8'
  ARM_USE_OIDC: true
  ARM_USE_AZUREAD: true

jobs:
  apply-dev:
    name: Apply (dev)
    runs-on: ubuntu-latest
    environment: dev
    # Skip dev/staging if their Terraform state backend doesn't exist yet
    continue-on-error: true

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_postgres_admin_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: terraform/envs/dev
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: terraform/envs/dev
        run: terraform apply -auto-approve -input=false

      - name: Get Runner Egress IP
        id: runner_ip
        run: echo "ip=$(curl -s https://api.ipify.org)" >> "$GITHUB_OUTPUT"

      - name: Add Temporary PostgreSQL Firewall Rule
        run: |
          az postgres flexible-server firewall-rule create \
            --resource-group "rg-aap-dev" \
            --name "aap-postgres-dev" \
            --rule-name "gh-runner-temp-$$" \
            --start-ip-address "${{ steps.runner_ip.outputs.ip }}" \
            --end-ip-address "${{ steps.runner_ip.outputs.ip }}"

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Create pgvector Extension
        env:
          PGPASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          PGSSLMODE: require
        run: |
          psql \
            -v ON_ERROR_STOP=1 \
            -h "aap-postgres-dev.postgres.database.azure.com" \
            -U aap_admin \
            -d aap \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Remove Temporary PostgreSQL Firewall Rule
        if: always()
        run: |
          az postgres flexible-server firewall-rule delete \
            --resource-group "rg-aap-dev" \
            --name "aap-postgres-dev" \
            --rule-name "gh-runner-temp-$$" \
            --yes || true

  apply-staging:
    name: Apply (staging)
    runs-on: ubuntu-latest
    needs: apply-dev
    if: always()
    environment: staging
    continue-on-error: true

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_postgres_admin_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: terraform/envs/staging
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: terraform/envs/staging
        run: terraform apply -auto-approve -input=false

      - name: Get Runner Egress IP
        id: runner_ip
        run: echo "ip=$(curl -s https://api.ipify.org)" >> "$GITHUB_OUTPUT"

      - name: Add Temporary PostgreSQL Firewall Rule
        run: |
          az postgres flexible-server firewall-rule create \
            --resource-group "rg-aap-staging" \
            --name "aap-postgres-staging" \
            --rule-name "gh-runner-temp-$$" \
            --start-ip-address "${{ steps.runner_ip.outputs.ip }}" \
            --end-ip-address "${{ steps.runner_ip.outputs.ip }}"

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Create pgvector Extension
        env:
          PGPASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          PGSSLMODE: require
        run: |
          psql \
            -v ON_ERROR_STOP=1 \
            -h "aap-postgres-staging.postgres.database.azure.com" \
            -U aap_admin \
            -d aap \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Install Python and Seed Dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r scripts/seed-runbooks/requirements.txt

      - name: Create Runbooks Table and Seed Data
        env:
          POSTGRES_HOST: aap-postgres-staging.postgres.database.azure.com
          POSTGRES_USER: aap_admin
          POSTGRES_DB: aap
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
        run: python3 scripts/seed-runbooks/seed.py

      - name: Validate Runbook Embeddings
        env:
          POSTGRES_HOST: aap-postgres-staging.postgres.database.azure.com
          POSTGRES_USER: aap_admin
          POSTGRES_DB: aap
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
        run: python3 scripts/seed-runbooks/validate.py

      - name: Remove Temporary PostgreSQL Firewall Rule
        if: always()
        run: |
          az postgres flexible-server firewall-rule delete \
            --resource-group "rg-aap-staging" \
            --name "aap-postgres-staging" \
            --rule-name "gh-runner-temp-$$" \
            --yes || true

  apply-prod:
    name: Apply (prod)
    runs-on: [self-hosted, azure, linux]
    environment: prod

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_postgres_admin_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: terraform/envs/prod
        run: terraform init -input=false

      - name: Provision Foundry Agents
        continue-on-error: true
        env:
          AZURE_PROJECT_ENDPOINT: ${{ secrets.FOUNDRY_PROJECT_ENDPOINT }}
        run: |
          pip install --quiet "azure-ai-projects>=2.0.1" "azure-ai-agents" "azure-identity"
          python scripts/provision-foundry-agents.py --no-deploy

      - name: Write Prod Credentials
        env:
          PROD_CREDENTIALS_TFVARS: ${{ secrets.PROD_CREDENTIALS_TFVARS }}
        run: |
          echo "$PROD_CREDENTIALS_TFVARS" > terraform/envs/prod/credentials.tfvars

      - name: Terraform Apply
        working-directory: terraform/envs/prod
        run: |
          EXTRA_VARS=""
          if [ -f "../../../scripts/agents.tfvars" ]; then
            EXTRA_VARS="-var-file ../../../scripts/agents.tfvars"
          fi
          terraform apply -auto-approve -input=false -var-file credentials.tfvars $EXTRA_VARS

      - name: Create pgvector Extension
        env:
          PGPASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          PGSSLMODE: require
        run: |
          psql \
            -v ON_ERROR_STOP=1 \
            -h "aap-postgres-prod.postgres.database.azure.com" \
            -U aap_admin \
            -d aap \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"
