name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TERRAFORM_VERSION: '1.9.8'
  ARM_USE_OIDC: true
  ARM_USE_AZUREAD: true

jobs:
  apply-prod:
    name: Apply (prod)
    runs-on: [self-hosted, azure, linux]
    environment: prod

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_client_id: ${{ secrets.AZURE_CLIENT_ID }}
      TF_VAR_client_secret: ${{ secrets.AZURE_CLIENT_SECRET }}
      TF_VAR_postgres_admin_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
      TF_VAR_fabric_admin_email: ${{ secrets.FABRIC_ADMIN_EMAIL }}
      TF_VAR_web_ui_public_url: ${{ secrets.WEB_UI_PUBLIC_URL }}
      TF_VAR_teams_bot_id: ${{ secrets.TEAMS_BOT_ID }}
      TF_VAR_teams_bot_password: ${{ secrets.TEAMS_BOT_PASSWORD }}
      TF_VAR_teams_channel_id: ${{ secrets.TEAMS_CHANNEL_ID }}
      TF_VAR_postgres_dsn: ${{ secrets.POSTGRES_DSN }}
      TF_VAR_pgvector_connection_string: ${{ secrets.PGVECTOR_CONNECTION_STRING }}
      TF_VAR_github_pat: ${{ secrets.RUNNER_GITHUB_PAT }}
      # Controls API Gateway auth mode without touching tfvars.
      # Set the "API_GATEWAY_AUTH_MODE" GitHub Actions variable to "disabled"
      # to bypass Entra auth (e.g. for testing), or "entra" to enforce it.
      # Falls back to the terraform.tfvars default ("entra") when not set.
      TF_VAR_api_gateway_auth_mode: ${{ vars.API_GATEWAY_AUTH_MODE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Tfstate Storage Account Is Accessible
        run: |
          # Azure Policy may re-disable publicNetworkAccess on the tfstate storage account.
          # The self-hosted runner accesses it over the public endpoint, so we must ensure
          # public access is enabled before terraform init.
          SA_NAME="staaptfstateprod"
          RG_NAME="rg-aap-tfstate-prod"
          ACCESS=$(az storage account show --name "$SA_NAME" --resource-group "$RG_NAME" \
            --query publicNetworkAccess --output tsv 2>/dev/null || echo "Unknown")
          if [ "$ACCESS" != "Enabled" ]; then
            echo "::warning::Tfstate storage $SA_NAME has publicNetworkAccess=$ACCESS — re-enabling"
            az storage account update --name "$SA_NAME" --resource-group "$RG_NAME" \
              --public-network-access Enabled --output none
            echo "Public network access re-enabled on $SA_NAME"
            # Wait for the change to propagate before terraform init hits the storage account
            sleep 10
          else
            echo "Tfstate storage $SA_NAME publicNetworkAccess is Enabled (OK)"
          fi

      - name: Terraform Init
        working-directory: terraform/envs/prod
        run: terraform init -input=false

      - name: Provision Foundry Agents
        continue-on-error: true
        env:
          AZURE_PROJECT_ENDPOINT: ${{ secrets.FOUNDRY_PROJECT_ENDPOINT }}
        run: |
          # Ensure python3-venv is available (required on Debian/Ubuntu runners).
          # Check ensurepip directly — `python3 -m venv --help` succeeds even when
          # ensurepip is missing (the venv module imports but can't seed pip).
          PYVER=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          if ! python3 -c "import ensurepip" &>/dev/null; then
            sudo apt-get install -y -qq "python${PYVER}-venv" || sudo apt-get install -y -qq python3-venv
          fi
          python3 -m venv .venv-foundry
          . .venv-foundry/bin/activate
          pip install --quiet "azure-ai-projects>=2.0.1" "azure-ai-agents" "azure-identity"
          python scripts/provision-foundry-agents.py --no-deploy

      - name: Enable Key Vault Public Access for Terraform
        run: |
          # Terraform's azurerm provider uses the autorest HTTP client which resolves
          # kv-aap-prod.vault.azure.net to the public IP even from VNet-resident runners.
          # Temporarily enable public access so azurerm_key_vault_secret reads/writes succeed.
          # Restored to Disabled in the post-apply step (always runs).
          az keyvault update \
            --name "kv-aap-prod" \
            --resource-group "rg-aap-prod" \
            --public-network-access Enabled \
            --output none
          echo "Key Vault kv-aap-prod: public network access enabled for terraform apply"

      - name: Terraform Apply
        working-directory: terraform/envs/prod
        run: |
          # Sensitive variables are injected via TF_VAR_* env vars (set in job env above).
          # TF_VAR_* env vars take highest precedence — they override any tfvars file values.
          # Variable precedence (highest to lowest): env vars > -var > last -var-file > auto-loaded tfvars
          EXTRA_VARS=""
          if [ -f "../../../scripts/agents.tfvars" ]; then
            EXTRA_VARS="-var-file ../../../scripts/agents.tfvars"
          fi
          terraform apply -auto-approve -input=false $EXTRA_VARS

      - name: Restore Key Vault Public Access to Enabled (IP-restricted)
        if: always()
        run: |
          # KV has IP allowlist for Container Apps outbound egress — keep public access Enabled
          # but the network_acls default_action=Deny means only allowed IPs can reach it.
          az keyvault update \
            --name "kv-aap-prod" \
            --resource-group "rg-aap-prod" \
            --public-network-access Enabled \
            --output none
          echo "Key Vault kv-aap-prod: public network access set to Enabled (IP-restricted via network_acls)"

      - name: Create pgvector Extension
        env:
          PGPASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          PGSSLMODE: require
        run: |
          psql \
            -v ON_ERROR_STOP=1 \
            -h "aap-postgres-prod.postgres.database.azure.com" \
            -U aap_admin \
            -d aap \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"
