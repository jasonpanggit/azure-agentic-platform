name: Prod DB Setup (one-time)

on:
  workflow_dispatch:
    inputs:
      postgres_server_name:
        description: 'PostgreSQL Flexible Server name'
        required: false
        type: string
        default: 'aap-postgres-prod'
      postgres_database:
        description: 'Database to migrate'
        required: false
        type: string
        default: 'aap'
      postgres_admin_user:
        description: 'Admin username for the PostgreSQL server'
        required: false
        type: string
        default: 'aap_admin'

permissions:
  id-token: write
  contents: read

concurrency:
  group: prod-db-setup
  cancel-in-progress: false

env:
  POSTGRES_SERVER_NAME: ${{ github.event.inputs.postgres_server_name || 'aap-postgres-prod' }}
  POSTGRES_DATABASE: ${{ github.event.inputs.postgres_database || 'aap' }}
  POSTGRES_ADMIN_USER: ${{ github.event.inputs.postgres_admin_user || 'aap_admin' }}

jobs:
  setup-pgvector:
    name: Enable pgvector + Run Migrations on Prod
    # Self-hosted runner runs inside the VNet — can reach the private PostgreSQL
    # endpoint directly. No public access or firewall rules needed.
    runs-on: [self-hosted, azure, linux]
    environment: prod

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate workflow inputs
        run: |
          if [[ ! "$POSTGRES_SERVER_NAME" =~ ^[a-z0-9-]{3,63}$ ]]; then
            echo "::error::Invalid PostgreSQL server name format"
            exit 1
          fi
          if [[ ! "$POSTGRES_DATABASE" =~ ^[A-Za-z0-9_-]{1,63}$ ]]; then
            echo "::error::Invalid PostgreSQL database name format"
            exit 1
          fi
          if [[ ! "$POSTGRES_ADMIN_USER" =~ ^[A-Za-z0-9_][A-Za-z0-9_-]{0,62}$ ]]; then
            echo "::error::Invalid PostgreSQL admin username format"
            exit 1
          fi

      - name: Validate migration files
        run: |
          for file in \
            services/api-gateway/migrations/001_create_runbooks_table.sql \
            services/api-gateway/migrations/003_create_gitops_config_table.sql \
            migrations/008_tenants.sql; do
            if [ ! -f "$file" ]; then
              echo "::error::Missing migration file: $file"
              exit 1
            fi
          done

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Run Migrations
        env:
          PGPASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          PGSSLMODE: require
        run: |
          # Runner is inside the VNet — connects directly to private DNS endpoint.
          # 002_seed_runbooks.py is a data-seeding utility, not a schema migration.
          psql \
            -v ON_ERROR_STOP=1 \
            -h "${POSTGRES_SERVER_NAME}.postgres.database.azure.com" \
            -U "$POSTGRES_ADMIN_USER" \
            -d "$POSTGRES_DATABASE" \
            -f services/api-gateway/migrations/001_create_runbooks_table.sql
          psql \
            -v ON_ERROR_STOP=1 \
            -h "${POSTGRES_SERVER_NAME}.postgres.database.azure.com" \
            -U "$POSTGRES_ADMIN_USER" \
            -d "$POSTGRES_DATABASE" \
            -f services/api-gateway/migrations/003_create_gitops_config_table.sql
          psql \
            -v ON_ERROR_STOP=1 \
            -h "${POSTGRES_SERVER_NAME}.postgres.database.azure.com" \
            -U "$POSTGRES_ADMIN_USER" \
            -d "$POSTGRES_DATABASE" \
            -f migrations/008_tenants.sql
          echo "All migrations applied successfully."
