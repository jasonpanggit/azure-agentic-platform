name: Arc MCP Server — Build & Test

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/arc-mcp-server-build.yml'
      - '.github/workflows/container-app-deploy.yml'
      - 'services/arc-mcp-server/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/arc-mcp-server-build.yml'
      - '.github/workflows/container-app-deploy.yml'
      - 'services/arc-mcp-server/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Unit tests — run in CI without Azure credentials
  # -------------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: [self-hosted, azure, linux]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: services/arc-mcp-server
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          # Test dependencies
          pip install pytest pytest-asyncio pytest-cov

      - name: Run unit tests
        working-directory: services/arc-mcp-server
        env:
          PYTHONPATH: ${{ github.workspace }}/services/arc-mcp-server
          ARC_DISCONNECT_ALERT_HOURS: "1"
        run: |
          . .venv/bin/activate
          pytest tests/ -m unit \
            --tb=short \
            -v \
            --cov=tools \
            --cov=models \
            --cov=auth \
            --cov-report=term-missing \
            --cov-fail-under=60

  build-image:
    name: Build Arc MCP Server Image
    needs: test
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: services/arc-mcp-server
      dockerfile_path: services/arc-mcp-server/Dockerfile
      build_context: services/arc-mcp-server/
      image_tag: ${{ github.sha }}
      push_image: ${{ github.event_name != 'pull_request' }}
      build_args: |
        IMAGE_TAG=${{ github.sha }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy:
    name: Deploy Arc MCP Server
    needs: build-image
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/container-app-deploy.yml
    with:
      image_name: services/arc-mcp-server
      image_tag: ${{ github.sha }}
      container_app_name: ca-arc-mcp-server-prod
      resource_group: ${{ vars.AZURE_RESOURCE_GROUP }}
      github_environment: production
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
