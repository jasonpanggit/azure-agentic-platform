name: Build API Gateway

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/api-gateway-build.yml'
      - '.github/workflows/container-app-deploy.yml'
      - '.github/workflows/docker-push.yml'
      - 'services/api-gateway/**'
  pull_request:
    paths:
      - '.github/workflows/api-gateway-build.yml'
      - '.github/workflows/container-app-deploy.yml'
      - '.github/workflows/docker-push.yml'
      - 'services/api-gateway/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-gateway:
    name: Build API Gateway Image
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: services/api-gateway
      dockerfile_path: services/api-gateway/Dockerfile
      build_context: .
      push_image: ${{ github.event_name != 'pull_request' }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-gateway:
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
    needs: build-gateway
    uses: ./.github/workflows/container-app-deploy.yml
    with:
      image_name: services/api-gateway
      image_tag: ${{ github.sha }}
      container_app_name: ca-api-gateway-prod
      resource_group: ${{ vars.AZURE_RESOURCE_GROUP }}
      github_environment: production
      healthcheck_path: /health
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
