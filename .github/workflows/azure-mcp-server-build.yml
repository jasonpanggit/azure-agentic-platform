name: Build Azure MCP Server

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/azure-mcp-server-build.yml'
      - '.github/workflows/container-app-deploy.yml'
      - '.github/workflows/docker-push.yml'
      - 'services/azure-mcp-server/**'
  pull_request:
    paths:
      - '.github/workflows/azure-mcp-server-build.yml'
      - '.github/workflows/container-app-deploy.yml'
      - '.github/workflows/docker-push.yml'
      - 'services/azure-mcp-server/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-azure-mcp-server:
    name: Build Azure MCP Server Image
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: services/azure-mcp-server
      dockerfile_path: services/azure-mcp-server/Dockerfile
      build_context: services/azure-mcp-server/
      push_image: ${{ github.event_name != 'pull_request' }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-azure-mcp-server:
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
    needs: build-azure-mcp-server
    uses: ./.github/workflows/container-app-deploy.yml
    with:
      image_name: services/azure-mcp-server
      image_tag: ${{ github.sha }}
      container_app_name: ca-azure-mcp-prod
      resource_group: ${{ vars.AZURE_RESOURCE_GROUP }}
      github_environment: production
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}