name: Phase 7 E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'services/**'
      - 'e2e/**'
      - 'agents/**'

permissions:
  id-token: write
  contents: read

env:
  E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
  E2E_API_URL: ${{ vars.E2E_API_URL }}

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging

    env:
      E2E_CLIENT_ID: ${{ secrets.E2E_CLIENT_ID }}
      E2E_CLIENT_SECRET: ${{ secrets.E2E_CLIENT_SECRET }}
      E2E_TENANT_ID: ${{ secrets.E2E_TENANT_ID }}
      E2E_API_AUDIENCE: ${{ secrets.E2E_API_AUDIENCE }}
      E2E_COSMOS_ENDPOINT: ${{ secrets.E2E_COSMOS_ENDPOINT }}
      E2E_COSMOS_DB: ${{ vars.E2E_COSMOS_DB || 'aap' }}
      E2E_TEAMS_TEAM_ID: ${{ secrets.E2E_TEAMS_TEAM_ID }}
      E2E_TEAMS_CHANNEL_ID: ${{ secrets.E2E_TEAMS_CHANNEL_ID }}
      E2E_GRAPH_CLIENT_ID: ${{ secrets.E2E_GRAPH_CLIENT_ID }}
      E2E_GRAPH_CLIENT_SECRET: ${{ secrets.E2E_GRAPH_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: e2e
        run: |
          npm init -y
          npm install @playwright/test @azure/msal-node @azure/cosmos @azure/identity @azure/monitor-query typescript

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests
        working-directory: e2e
        run: npx playwright test --config=playwright.config.ts --project=e2e-chromium
        timeout-minutes: 15

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-results
          path: e2e/test-results/
          retention-days: 7
