    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.base_related != 'true' && needs.detect-changes.outputs.storage == 'true'
    uses: ./.github/workflows/container-app-deploy.yml
    with:
      image_name: agents/storage
      image_tag: ${{ github.sha }}
      container_app_name: ca-storage-prod
      resource_group: ${{ vars.AZURE_RESOURCE_GROUP }}
      github_environment: production
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-security:
    needs: [detect-changes, build-security]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.base_related != 'true' && needs.detect-changes.outputs.security == 'true'
    uses: ./.github/workflows/container-app-deploy.yml
    with:
      image_name: agents/security
      image_tag: ${{ github.sha }}
      container_app_name: ca-security-prod
      resource_group: ${{ vars.AZURE_RESOURCE_GROUP }}
      github_environment: production
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-sre:
    needs: [detect-changes, build-sre]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.base_related != 'true' && needs.detect-changes.outputs.sre == 'true'
    uses: ./.github/workflows/container-app-deploy.yml
    with:
      image_name: agents/sre
      image_tag: ${{ github.sha }}
      container_app_name: ca-sre-prod
      resource_group: ${{ vars.AZURE_RESOURCE_GROUP }}
      github_environment: production
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-arc:
    needs: [detect-changes, build-arc]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.base_related != 'true' && needs.detect-changes.outputs.arc == 'true'
    uses: ./.github/workflows/container-app-deploy.yml
    with:
      image_name: agents/arc
      image_tag: ${{ github.sha }}
      container_app_name: ca-arc-prod
      resource_group: ${{ vars.AZURE_RESOURCE_GROUP }}
      github_environment: production
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-patch:
    name: Build Patch Agent
    needs: [detect-changes, resolve-base-image]
    if: needs.detect-changes.outputs.base_related != 'true' && needs.detect-changes.outputs.patch == 'true'
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/patch
      dockerfile_path: agents/patch/Dockerfile
      build_context: agents/patch/
      push_image: true
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ needs.resolve-base-image.outputs.tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-eol:
    name: Build EOL Agent
    needs: [detect-changes, resolve-base-image]
    if: needs.detect-changes.outputs.base_related != 'true' && needs.detect-changes.outputs.eol == 'true'
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/eol
      dockerfile_path: agents/eol/Dockerfile
      build_context: agents/eol/
      push_image: true
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ needs.resolve-base-image.outputs.tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-patch:
    needs: [detect-changes, build-patch]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.base_related != 'true' && needs.detect-changes.outputs.patch == 'true'
    uses: ./.github/workflows/container-app-deploy.yml
    with:
      image_name: agents/patch
      image_tag: ${{ github.sha }}
      container_app_name: ca-patch-prod
      resource_group: ${{ vars.AZURE_RESOURCE_GROUP }}
      github_environment: production
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-eol:
    needs: [detect-changes, build-eol]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.base_related != 'true' && needs.detect-changes.outputs.eol == 'true'
    uses: ./.github/workflows/container-app-deploy.yml
    with:
      image_name: agents/eol
      image_tag: ${{ github.sha }}
      container_app_name: ca-eol-prod
      resource_group: ${{ vars.AZURE_RESOURCE_GROUP }}
      github_environment: production
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
