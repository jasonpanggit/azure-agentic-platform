name: Build Agent Images

on:
  workflow_dispatch:
    inputs:
      agent:
        description: 'Agent to build and deploy (leave empty to build all changed agents)'
        required: false
        type: choice
        options:
          - ''
          - orchestrator
          - compute
          - network
          - storage
          - security
          - sre
          - arc
          - patch
          - eol
  push:
    branches: [main]
    paths:
      - '.github/workflows/agent-images.yml'
      - 'agents/requirements-base.txt'
      - 'agents/Dockerfile.base'
      - 'agents/shared/**'
      - 'agents/orchestrator/**'
      - 'agents/compute/**'
      - 'agents/network/**'
      - 'agents/storage/**'
      - 'agents/security/**'
      - 'agents/sre/**'
      - 'agents/arc/**'
      - 'agents/patch/**'
      - 'agents/eol/**'

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    name: Detect Changed Agents
    runs-on: ubuntu-latest
    outputs:
      base_related: ${{ steps.resolve.outputs.base_related }}
      orchestrator: ${{ steps.resolve.outputs.orchestrator }}
      compute: ${{ steps.resolve.outputs.compute }}
      network: ${{ steps.resolve.outputs.network }}
      storage: ${{ steps.resolve.outputs.storage }}
      security: ${{ steps.resolve.outputs.security }}
      sre: ${{ steps.resolve.outputs.sre }}
      arc: ${{ steps.resolve.outputs.arc }}
      patch: ${{ steps.resolve.outputs.patch }}
      eol: ${{ steps.resolve.outputs.eol }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: changes
        with:
          filters: |
            base_related:
              - '.github/workflows/base-image.yml'
              - '.github/workflows/container-app-deploy.yml'
              - '.github/workflows/docker-push.yml'
              - 'agents/Dockerfile.base'
              - 'agents/requirements-base.txt'
              - 'agents/shared/**'
            orchestrator:
              - 'agents/orchestrator/**'
            compute:
              - 'agents/compute/**'
            network:
              - 'agents/network/**'
            storage:
              - 'agents/storage/**'
            security:
              - 'agents/security/**'
            sre:
              - 'agents/sre/**'
            arc:
              - 'agents/arc/**'
            patch:
              - 'agents/patch/**'
            eol:
              - 'agents/eol/**'

      # When triggered via workflow_dispatch with a specific agent, override the
      # paths-filter output so only that agent builds regardless of file changes.
      - name: Resolve agent flags
        id: resolve
        run: |
          MANUAL="${{ inputs.agent }}"
          agents=(orchestrator compute network storage security sre arc patch eol)
          for a in "${agents[@]}"; do
            if [ -n "$MANUAL" ]; then
              # Manual dispatch: force only the selected agent to true
              [ "$a" = "$MANUAL" ] && val=true || val=false
            else
              # Push: use paths-filter output
              val="${{ steps.changes.outputs[format('{0}', matrix.agent)] }}"
              # Inline eval since GitHub expressions can't do dynamic keys here
              case "$a" in
                orchestrator) val="${{ steps.changes.outputs.orchestrator }}" ;;
                compute)      val="${{ steps.changes.outputs.compute }}" ;;
                network)      val="${{ steps.changes.outputs.network }}" ;;
                storage)      val="${{ steps.changes.outputs.storage }}" ;;
                security)     val="${{ steps.changes.outputs.security }}" ;;
                sre)          val="${{ steps.changes.outputs.sre }}" ;;
                arc)          val="${{ steps.changes.outputs.arc }}" ;;
                patch)        val="${{ steps.changes.outputs.patch }}" ;;
                eol)          val="${{ steps.changes.outputs.eol }}" ;;
              esac
            fi
            printf '%s=%s\n' "$a" "$val" >> "$GITHUB_OUTPUT"
          done
          # base_related: never force-true for manual single-agent dispatch
          printf 'base_related=%s\n' "${{ steps.changes.outputs.base_related }}" >> "$GITHUB_OUTPUT"

  resolve-base-image:
    name: Resolve Published Base Image Tag
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.base_related != 'true' && (
      needs.detect-changes.outputs.orchestrator == 'true' ||
      needs.detect-changes.outputs.compute == 'true' ||
      needs.detect-changes.outputs.network == 'true' ||
      needs.detect-changes.outputs.storage == 'true' ||
      needs.detect-changes.outputs.security == 'true' ||
      needs.detect-changes.outputs.sre == 'true' ||
      needs.detect-changes.outputs.arc == 'true' ||
      needs.detect-changes.outputs.patch == 'true' ||
      needs.detect-changes.outputs.eol == 'true')
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve Azure auth mode
        id: auth
        env:
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          if [ -n "$AZURE_CLIENT_SECRET" ]; then
            echo "mode=client-secret" >> "$GITHUB_OUTPUT"
          else
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure Login (client secret)
        if: steps.auth.outputs.mode == 'client-secret'
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          timeout 60 az login --service-principal \
            --username "$AZURE_CLIENT_ID" \
            --password "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID" \
            --output none
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

      - name: Azure Login (OIDC)
        if: steps.auth.outputs.mode == 'oidc'
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302 # v2.2.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve latest immutable base tag
        id: resolve
        run: |
          ACR_NAME="${{ vars.ACR_LOGIN_SERVER }}"
          if [ -z "$ACR_NAME" ]; then
            echo "::error::ACR_LOGIN_SERVER repository variable is not set"
            exit 1
          fi

          ACR_NAME="${ACR_NAME%%.azurecr.io}"
          if [[ ! "$ACR_NAME" =~ ^[a-z0-9][a-z0-9-]{3,48}[a-z0-9]$ ]]; then
            echo "::error::Resolved ACR name has an invalid format: $ACR_NAME"
            exit 1
          fi

          BASE_TAG=$(az acr repository show-tags \
            --name "$ACR_NAME" \
            --repository agents/base \
            --orderby time_desc \
            --top 20 \
            -o tsv | grep -vx 'latest' | head -n 1)

          if [ -z "$BASE_TAG" ]; then
            echo "::error::No immutable base image tag found in ACR for agents/base"
            exit 1
          fi

          if [[ ! "$BASE_TAG" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::Resolved base image tag has an invalid format: $BASE_TAG"
            exit 1
          fi

          echo "Resolved base image tag: $BASE_TAG"
          printf 'tag=%s\n' "$BASE_TAG" >> "$GITHUB_OUTPUT"

  build-orchestrator:
    name: Build Orchestrator
    needs: [detect-changes, resolve-base-image]
    if: needs.detect-changes.outputs.base_related != 'true' && needs.detect-changes.outputs.orchestrator == 'true'
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/orchestrator
      dockerfile_path: agents/orchestrator/Dockerfile
      build_context: agents/orchestrator/
      push_image: true
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ needs.resolve-base-image.outputs.tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-compute:
    name: Build Compute Agent
    needs: [detect-changes, resolve-base-image]
    if: needs.detect-changes.outputs.base_related != 'true' && needs.detect-changes.outputs.compute == 'true'
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/compute
      dockerfile_path: agents/compute/Dockerfile
      build_context: agents/compute/
      push_image: true
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ needs.resolve-base-image.outputs.tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-network:
    name: Build Network Agent
    needs: [detect-changes, resolve-base-image]
    if: needs.detect-changes.outputs.base_related != 'true' && needs.detect-changes.outputs.network == 'true'
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/network
      dockerfile_path: agents/network/Dockerfile
      build_context: agents/network/
      push_image: true
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ needs.resolve-base-image.outputs.tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-storage:
    name: Build Storage Agent
    needs: [detect-changes, resolve-base-image]
    if: needs.detect-changes.outputs.base_related != 'true' && needs.detect-changes.outputs.storage == 'true'
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/storage
      dockerfile_path: agents/storage/Dockerfile
      build_context: agents/storage/
      push_image: true
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ needs.resolve-base-image.outputs.tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-security:
    name: Build Security Agent
    needs: [detect-changes, resolve-base-image]
    if: needs.detect-changes.outputs.base_related != 'true' && needs.detect-changes.outputs.security == 'true'
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/security
      dockerfile_path: agents/security/Dockerfile
      build_context: agents/security/
      push_image: true
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ needs.resolve-base-image.outputs.tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-sre:
    name: Build SRE Agent
    needs: [detect-changes, resolve-base-image]
    if: needs.detect-changes.outputs.base_related != 'true' && needs.detect-changes.outputs.sre == 'true'
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/sre
      dockerfile_path: agents/sre/Dockerfile
      build_context: agents/sre/
      push_image: true
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ needs.resolve-base-image.outputs.tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-arc:
    name: Build Arc Agent
    needs: [detect-changes, resolve-base-image]
    if: needs.detect-changes.outputs.base_related != 'true' && needs.detect-changes.outputs.arc == 'true'
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/arc
      dockerfile_path: agents/arc/Dockerfile
      build_context: agents/arc/
      push_image: true
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ needs.resolve-base-image.outputs.tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-orchestrator:
    needs: [detect-changes, build-orchestrator]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.base_related != 'true' && needs.detect-changes.outputs.orchestrator == 'true'
    uses: ./.github/workflows/container-app-deploy.yml
    with:
      image_name: agents/orchestrator
      image_tag: ${{ github.sha }}
      container_app_name: ca-orchestrator-prod
      resource_group: ${{ vars.AZURE_RESOURCE_GROUP }}
      github_environment: production
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-compute:
    needs: [detect-changes, build-compute]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.base_related != 'true' && needs.detect-changes.outputs.compute == 'true'
    uses: ./.github/workflows/container-app-deploy.yml
    with:
      image_name: agents/compute
      image_tag: ${{ github.sha }}
      container_app_name: ca-compute-prod
      resource_group: ${{ vars.AZURE_RESOURCE_GROUP }}
      github_environment: production
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-network:
    needs: [detect-changes, build-network]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.base_related != 'true' && needs.detect-changes.outputs.network == 'true'
    uses: ./.github/workflows/container-app-deploy.yml
    with:
      image_name: agents/network
      image_tag: ${{ github.sha }}
      container_app_name: ca-network-prod
      resource_group: ${{ vars.AZURE_RESOURCE_GROUP }}
      github_environment: production
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-storage:
