name: Build Agent Base Image

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/base-image.yml'
      - '.github/workflows/container-app-deploy.yml'
      - '.github/workflows/docker-push.yml'
      - 'agents/Dockerfile.base'
      - 'agents/requirements-base.txt'
      - 'agents/shared/**'
  pull_request:
    paths:
      - '.github/workflows/base-image.yml'
      - '.github/workflows/container-app-deploy.yml'
      - '.github/workflows/docker-push.yml'
      - 'agents/Dockerfile.base'
      - 'agents/requirements-base.txt'
      - 'agents/shared/**'

permissions:
  id-token: write
  contents: read

jobs:
  build-base:
    name: Build Agent Base Image
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/base
      dockerfile_path: agents/Dockerfile.base
      build_context: agents/
      image_tag: ${{ github.sha }}
      push_image: ${{ github.event_name != 'pull_request' }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-orchestrator:
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
    needs: build-base
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/orchestrator
      dockerfile_path: agents/orchestrator/Dockerfile
      build_context: agents/orchestrator/
      image_tag: ${{ github.sha }}
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ github.sha }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-compute:
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
    needs: build-base
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/compute
      dockerfile_path: agents/compute/Dockerfile
      build_context: agents/compute/
      image_tag: ${{ github.sha }}
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ github.sha }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-network:
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
    needs: build-base
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/network
      dockerfile_path: agents/network/Dockerfile
      build_context: agents/network/
      image_tag: ${{ github.sha }}
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ github.sha }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-storage:
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
    needs: build-base
    uses: ./.github/workflows/docker-push.yml
    with:
      image_name: agents/storage
      dockerfile_path: agents/storage/Dockerfile
      build_context: agents/storage/
      image_tag: ${{ github.sha }}
      build_args: |
        BASE_IMAGE=${{ vars.ACR_LOGIN_SERVER }}/agents/base:${{ github.sha }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  build-security:
